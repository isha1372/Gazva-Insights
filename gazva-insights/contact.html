<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Gazva Insights</title>
  <meta name="description" content="Get in touch with Gazva Insights by email, phone, WhatsApp, or our contact form." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800&family=Noto+Sans+Malayalam:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>

  <div id="siteHeader"></div>

  <main id="main">
    <div class="page-banner">
      <div class="page-banner__inner">
        <span class="eyebrow cat-general">Contact</span>
        <h1>Get in touch</h1>
        <p>Questions, corrections, or article ideas — we read everything that comes in.</p>
      </div>
    </div>

    <section class="contact-grid">
      <div class="contact-cards">
        <div class="contact-card">
          <span class="contact-card__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z" stroke-opacity="0"/><path d="M4 6h16v12H4z"/><path d="m4 7 8 6 8-6"/></svg>
          </span>
          <div>
            <div class="contact-card__title">Email</div>
            <div class="contact-card__detail"><a href="mailto:hello@gazvainsights.com">hello@gazvainsights.com</a></div>
          </div>
        </div>

        <div class="contact-card">
          <span class="contact-card__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92Z"/></svg>
          </span>
          <div>
            <div class="contact-card__title">Phone</div>
            <div class="contact-card__detail"><a href="tel:+919000000000">+91 90000 00000</a></div>
          </div>
        </div>

        <div class="contact-card">
          <span class="contact-card__icon">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.1-1.7-.8-2-.9-.3-.1-.5-.1-.6.1-.2.3-.7.9-.9 1-.2.2-.3.2-.6.1-.9-.4-1.8-1-2.6-1.9-.7-.8-1.2-1.6-1.5-2.2-.1-.3 0-.4.1-.6l.4-.5c.1-.2.2-.3.2-.5 0-.2 0-.4-.1-.5-.1-.2-.6-1.5-.8-2-.2-.5-.4-.4-.6-.4h-.5c-.2 0-.5.1-.7.3-.3.3-1 .9-1 2.3s1 2.7 1.1 2.9c.1.2 1.7 2.7 4.3 3.7 2.5 1 2.5.7 3 .6.4-.1 1.4-.6 1.6-1.1.2-.6.2-1 .1-1.1-.1-.1-.2-.2-.5-.3Zm-5.5 6.9h-.1a8.9 8.9 0 0 1-4.5-1.2l-.3-.2-3.3.9.9-3.2-.2-.3a8.9 8.9 0 0 1-1.3-4.7c0-4.9 4-8.9 9-8.9 2.4 0 4.6.9 6.3 2.6a8.8 8.8 0 0 1 2.6 6.3c0 5-4 8.9-9.1 8.9Zm7.7-16.6A10.6 10.6 0 0 0 12 1.6c-5.9 0-10.7 4.7-10.7 10.6 0 1.9.5 3.7 1.4 5.2L1.6 22.4l5.2-1.4c1.5.8 3.2 1.3 5 1.3h.1c5.9 0 10.7-4.7 10.7-10.6 0-2.8-1.1-5.5-3.1-7.5Z"/></svg>
          </span>
          <div>
            <div class="contact-card__title">WhatsApp</div>
            <div class="contact-card__detail"><a href="https://wa.me/919000000000" target="_blank" rel="noopener">Message us directly</a></div>
          </div>
        </div>
      </div>

      <div class="contact-form-panel">
        <h2 style="font-size:1.3rem; font-weight:700; margin-bottom: 6px;">Send us a message</h2>
        <p style="color: var(--ink-soft); font-size: 0.92rem; margin-bottom: 22px;">Fill in the form and we'll get back to you within a few days.</p>
        <form id="contactForm" novalidate>
          <div class="contact-form-row">
            <div class="form-field">
              <label for="contact-name">Name</label>
              <input id="contact-name" name="name" type="text" required autocomplete="name" />
            </div>
            <div class="form-field">
              <label for="contact-email">Email</label>
              <input id="contact-email" name="email" type="email" required autocomplete="email" />
            </div>
          </div>
          <div class="form-field" style="margin-top:16px;">
            <label for="contact-subject">Subject</label>
            <input id="contact-subject" name="subject_line" type="text" required />
          </div>
          <div class="form-field" style="margin-top:16px;">
            <label for="contact-message">Message</label>
            <textarea id="contact-message" name="message" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="margin-top:18px;">Send message</button>
          <div class="form-status" id="contactFormStatus" role="status"></div>
        </form>
      </div>
    </section>
  </main>

  <div id="siteFooter"></div>

  <script src="js/component.js"></script>
  <script src="js/form.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      if (window.GazvaForms) {
        window.GazvaForms.bindWeb3Form("contactForm", "contactFormStatus", {
          subject: "New contact form submission — Gazva Insights",
        });
      }
    });
  </script>
</body>
</html>
